name: Build and Deploy Kitkars Next.jd App
on:
  push:
    branches: [no-docker]
  workflow_dispatch:

jobs:
  build:
    name: Build App on CI-runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch "no-docker"
        uses: actions/checkout@v4
        with:
          ref: no-docker

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: ./next-app
        run: npm ci

      - name: Create .env file
        working-directory: ./next-app
        run: |
          cat > .env << 'EOF'
          CITY_LOCATION=Ижевск
          DOMEN=https://kitkars.ru
          MAIN_TEL=+7 (922) 520-77-71
          SITE_NAME=Китайский тюнинг
          ADDRESS=Ижевск, пер.Спартаковский, д. 8

          FIRST_MANAGER_TEL=+7 (922) 520-77-71
          FIRST_MANAGER_NAME=Зорин Сергей
          FIRST_MANAGER_EMAIL=zsa@troffi.ru
          SECOND_MANAGER_TEL=+7 (922) 513-26-00
          SECOND_MANAGER_NAME=Бушмелев Александр
          SECOND_MANAGER_EMAIL=bam@troffi.ru
          EOF

          echo "BITRIX_KEY=${{ secrets.BITRIX_KEY }}" >> .env

      - name: Run npm build
        working-directory: ./next-app
        run: npm run build

      - name: Package Build Artifact
        run: |
          cd next-app
          mkdir -p ../artifact
          mv .next ../artifact
          mv node_modules ../artifact
          mv public ../artifact
          mv package.json ../artifact
          cd ..
          tar -czf build.tar.gz -C artifact .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build.tar.gz

  deploy:
    name: Transmit App Files from Runner to Production Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch "no-docker" # New runner for copying updater-scripts
        uses: actions/checkout@v4
        with:
          ref: no-docker

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Copy updater-scripts to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "updater-scripts/."
          target: "/var/www/kitkars/shared-scripts/"
          strip_components: 0
          overwrite: true

      - name: Copy build artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "build.tar.gz"
          target: "/var/www/kitkars/kitkars.ru/"

      - name: Deploy and restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            #!/bin/bash
            set -e

            SITE_DIR="/var/www/kitkars/kitkars.ru"
            SCRIPTS_DIR="/var/www/kitkars/shared-scripts"
            CONTENT_DIR="/var/www/kitkars/content-data"

            echo "🚀 Starting deployment..."

            # 1. Run updater-scripts
            echo "🔄 Running updater scripts..."
            cd "$SCRIPTS_DIR"

            if [ -f "package.json" ]; then
              npm ci --production
            fi

            node updateContent.js \
              "/var/www/kitkars/.env" \
              "$CONTENT_DIR"

            echo "✅ Content generated successfully"
            ls -la "$CONTENT_DIR"

            # 2. Update App
            cd "$SITE_DIR"

            echo "📦 Extracting build artifact..."
            mkdir -p new-deploy
            tar -xzf build.tar.gz -C new-deploy/
            rm build.tar.gz

            echo "🛑 Stopping current app..."
            pm2 stop kitkars-app 2>/dev/null || true

            echo "🔄 Swapping files..."
            rm -rf .next node_modules public package.json
            mv new-deploy/.next .next
            mv new-deploy/node_modules node_modules
            mv new-deploy/public public 2>/dev/null || true
            mv new-deploy/package.json package.json
            rm -rf new-deploy

            # 3. Launching App
            echo "🚀 Starting app with PM2..."
            PORT=30080 pm2 start npm \
              --name kitkars-app \
              -- start 

            pm2 save

            echo "✅ Deployment completed!"
            pm2 status | grep kitkars-app
